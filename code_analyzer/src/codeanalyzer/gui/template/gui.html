<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code Analyzer</title>
<style>
/* ==== Design tokens (white x green, WCAG 2.1 AA) ==== */
:root{
  --bg:#FAFAF9; --panel-bg:#FFFFFF; --border:#E7E5E4; --border-soft:#EFEDEB; --border-strong:#D6D3D1; --border-input:#8E8984;
  --text:#1C1917; --text-muted:#57534E; --text-disabled:#78716C;
  --accent:#15803D; --accent-hover:#166534; --accent-active:#14532D; --accent-dark:#14532D;
  --accent-tint:#F0FDF4; --accent-border:#BBF7D0; --focus:#16A34A;
  --amber:#B45309; --amber-bg:#FFFBEB; --amber-border:#FDE68A;
  --red:#B91C1C; --red-bg:#FEF2F2; --red-border:#FECACA;
  --green:#166534; --green-bg:#DCFCE7;
  --grey-bg:#F5F5F4;
  --shadow:0 1px 2px rgba(28,25,23,0.06),0 1px 6px rgba(28,25,23,0.05);
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg); color:var(--text); font-size:14px; line-height:1.5;
  font-variant-numeric:tabular-nums;
}
h1,h2,h3{margin:0 0 8px 0; font-weight:600;}
h2{font-size:15px; border-bottom:1px solid var(--border-soft); padding-bottom:6px; margin-bottom:12px;}
.muted{color:var(--text-muted); font-size:12.5px;}
.hidden{display:none !important;}
.visually-hidden{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ==== Skip link ==== */
.skip-link{
  position:absolute; left:0; top:-48px; z-index:1000; background:var(--accent); color:#fff;
  padding:12px 18px; border-radius:0 0 8px 0; font-weight:600; text-decoration:none;
  transition:top .15s;
}
.skip-link:focus{top:0;}

header{
  background:var(--panel-bg); border-bottom:1px solid var(--border);
  padding:14px 20px; display:flex; align-items:baseline; gap:10px;
}
header h1{font-size:19px; display:inline-flex; align-items:center; margin-right:0;}
.brand-mark{
  width:26px; height:26px; border-radius:7px; background:var(--accent); color:#fff;
  display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:800;
  margin-right:9px; flex:none;
}
#version-badge{font-size:12.5px; color:var(--text-muted);}

main{max-width:880px; margin:0 auto; padding:20px 20px 60px 20px;}

.panel{
  background:var(--panel-bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow);
}

/* ==== Buttons / inputs ==== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  min-height:40px; padding:8px 16px; border-radius:var(--radius); border:1px solid var(--border-input);
  background:#fff; color:var(--text); cursor:pointer; font-size:13.5px; font-weight:600;
  transition:background .15s,border-color .15s,transform .05s;
}
.btn:hover{background:var(--bg);}
.btn:active{transform:translateY(1px);}
.btn:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
.btn:disabled{background:var(--border); color:var(--text-disabled); border-color:var(--border); cursor:not-allowed; transform:none;}
.btn-primary{background:var(--accent); color:#fff; border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-hover); border-color:var(--accent-hover);}
.btn-primary:disabled{background:var(--border); color:var(--text-disabled); border-color:var(--border);}
.btn-big{padding:10px 24px; font-size:15px; font-weight:600;}
.btn-sm{padding:6px 14px; font-size:12.5px;}
.btn[aria-disabled="true"]{background:var(--border); color:var(--text-disabled); border-color:var(--border); cursor:not-allowed;}
.btn[aria-disabled="true"]:hover{background:var(--border);}
input[type=text],input[type=number]{
  min-height:40px; padding:8px 12px; border:1px solid var(--border-input); border-radius:6px; font-size:13.5px;
  background:#fff; color:var(--text); width:100%;
}
input[type=text]:focus-visible,input[type=number]:focus-visible{
  outline:2px solid var(--focus); outline-offset:1px; border-color:var(--accent);
}
input.invalid{border-color:var(--red);}
input[type=checkbox]{width:18px; height:18px; accent-color:var(--accent);}
input[type=checkbox]:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
label.field{display:block; font-size:12.5px; font-weight:600; color:var(--text-muted); margin-bottom:4px;}
.field-row{margin-bottom:12px;}
.field-help{font-size:12.5px; color:var(--text-muted); margin-top:4px;}
.field-error{font-size:12.5px; color:var(--red); margin-top:6px; font-weight:600;}
.checkbox-row{display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13.5px; min-height:40px;}
.checkbox-row input{width:auto;}

/* ==== Folder browser ==== */
#breadcrumb{
  font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  font-size:12.5px; background:var(--grey-bg); border:1px solid var(--border-soft);
  border-radius:6px; padding:10px; margin-bottom:8px; word-break:break-all;
}
#browse-toolbar{display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap;}
#dir-list{
  list-style:none; margin:0; padding:0; max-height:240px; overflow:auto;
  border:1px solid var(--border-soft); border-radius:6px;
}
#dir-list li{border-bottom:1px solid var(--border-soft);}
#dir-list li:last-child{border-bottom:none;}
#dir-list button{
  display:block; width:100%; min-height:40px; text-align:left; background:none; border:none;
  padding:8px 12px; font-size:13.5px; cursor:pointer; color:var(--text);
}
#dir-list button:hover{background:var(--accent-tint); color:var(--accent-active);}
#dir-list button:focus-visible{outline:2px solid var(--focus); outline-offset:-2px; background:var(--accent-tint);}
#dir-list .empty-note{padding:10px 12px; color:var(--text-muted); font-size:12.5px; min-height:40px; display:flex; align-items:center;}
.path-sync-row{display:flex; gap:8px;}
.path-sync-row input{flex:1;}
.browse-error{color:var(--red); background:var(--red-bg); border:1px solid var(--red-border); border-radius:6px; padding:8px 10px; font-size:12.5px; margin-top:8px;}

/* ==== Options (collapsible) ==== */
h2 .disclosure-btn{
  background:none; border:none; cursor:pointer; color:var(--accent-active); min-height:40px;
  font-size:14px; padding:0; font-weight:600; width:100%; text-align:left;
}
h2 .disclosure-btn:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
#options-body{margin-top:14px;}
.options-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px;}
@media (max-width:640px){.options-grid{grid-template-columns:1fr;}}

/* ==== Run / progress ==== */
#run-row{display:flex; align-items:center; gap:14px; margin-top:6px; flex-wrap:wrap;}
#run-shortcut-hint{
  font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  font-size:12.5px; color:var(--text-muted); background:var(--grey-bg);
  border:1px solid var(--border-soft); border-radius:6px; padding:4px 8px;
}
#run-status-text{font-size:13.5px; color:var(--text-muted); margin-top:10px; min-height:1.4em;}
.progress-indeterminate{
  position:relative; height:6px; width:220px; max-width:100%;
  background:var(--border); border-radius:999px; overflow:hidden;
}
.progress-indeterminate .progress-fill{
  position:absolute; top:0; left:-40%; height:100%; width:40%;
  background:var(--accent); border-radius:999px; animation:indeterminate 1.3s ease-in-out infinite;
}
@keyframes indeterminate{
  0%{left:-40%;}
  100%{left:100%;}
}
.progress-static-text{display:none; font-size:13.5px; color:var(--text-muted); font-weight:600;}
@media (prefers-reduced-motion:reduce){
  .progress-indeterminate{display:none;}
  .progress-static-text{display:inline-block;}
}
#phase-steps{display:flex; gap:8px; margin-top:14px; font-size:13px; flex-wrap:wrap;}
.phase-step{
  padding:5px 14px; border-radius:999px; color:var(--text-muted);
  background:var(--bg); border:1px solid var(--border); font-weight:600;
}
.phase-step.past{background:var(--green-bg); color:var(--green); border-color:var(--accent-border);}
.phase-step.current{background:var(--accent); color:#fff; border-color:var(--accent-active);}
#progress-area{margin-top:10px;}
#result-area{margin-top:14px;}
.summary-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:12px 0;}
.summary-card{
  background:var(--grey-bg); border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:10px 12px; text-align:center;
}
.summary-value{font-size:20px; font-weight:700; color:var(--accent-dark); font-variant-numeric:tabular-nums;}
.summary-label{font-size:12.5px; color:var(--text-muted); margin-top:2px;}
.out-dir-line{font-size:12.5px; color:var(--text-muted); margin-top:8px; word-break:break-all;}
.error-box{
  background:var(--red-bg); color:var(--red); padding:10px 14px; border-radius:6px;
  margin-top:10px; font-size:13.5px; border:1px solid var(--red-border);
}
.error-detail{margin-top:8px;}
.error-detail summary{
  cursor:pointer; font-weight:600; color:var(--red); min-height:24px;
}
.error-detail summary:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
.error-detail-pre{
  font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  font-size:12.5px; line-height:1.5; color:var(--text); background:#fff;
  border:1px solid var(--red-border); border-radius:6px; padding:10px;
  margin:8px 0; max-height:260px; overflow:auto; white-space:pre-wrap;
  word-break:break-all; -webkit-user-select:all; user-select:all;
}
.error-detail-pre:focus-visible{outline:2px solid var(--focus); outline-offset:1px;}

/* ==== Recent list ==== */
#recent-filter-row{margin-bottom:12px;}
#recent-list{list-style:none; margin:0; padding:0;}
#recent-list li{
  border-bottom:1px solid var(--border-soft); padding:10px 2px; min-height:40px;
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
#recent-list li:last-child{border-bottom:none;}
.recent-main{min-width:0; flex:1;}
.recent-path{
  font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  font-size:12.5px; word-break:break-all;
}
.recent-meta{font-size:12.5px; color:var(--text-muted); margin-top:2px;}
.recent-ts{font-weight:600; color:var(--text); font-size:12.5px;}
.recent-actions{display:flex; gap:6px; flex-shrink:0; align-items:center; flex-wrap:wrap;}
#recent-empty{color:var(--text-muted); font-size:13.5px;}
.recent-compare-checkbox{margin-right:4px;}
.recent-compare-label{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-muted); min-height:40px;}
#compare-toolbar{margin-bottom:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
#compare-hint{font-size:12.5px; color:var(--text-muted);}

footer{padding:14px 20px; color:var(--text-muted); font-size:12.5px; text-align:center;}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important; animation-duration:0.01ms !important; animation-iteration-count:1 !important;}
}
</style>
</head>
<body>

<a href="#main" class="skip-link">本文へスキップ</a>

<header>
  <h1><span class="brand-mark" aria-hidden="true">CA</span>Code Analyzer</h1>
  <span id="version-badge">v__VERSION__</span>
</header>

<main id="main" tabindex="-1">
  <!-- ============ プロジェクト選択 ============ -->
  <section class="panel" aria-labelledby="heading-project">
    <h2 id="heading-project">プロジェクト選択</h2>
    <div id="breadcrumb" aria-live="polite">読み込み中…</div>
    <div id="browse-toolbar">
      <button id="up-btn" class="btn btn-sm" type="button" aria-label="親フォルダへ移動">↑ 上へ</button>
      <label class="checkbox-row" style="margin:0;" for="hidden-toggle">
        <input type="checkbox" id="hidden-toggle"> 隠しフォルダ表示
      </label>
    </div>
    <ul id="dir-list" aria-label="サブフォルダ一覧"><li class="empty-note">読み込み中…</li></ul>
    <div class="field-row" style="margin-top:12px;">
      <label class="field" for="path-input">プロジェクトパスを直接入力</label>
      <div class="path-sync-row">
        <input type="text" id="path-input" placeholder="パスを直接入力…" aria-describedby="browse-error" list="path-datalist" autocomplete="off">
        <datalist id="path-datalist"></datalist>
        <button id="path-sync-btn" class="btn" type="button">同期</button>
      </div>
      <div id="browse-error" class="browse-error hidden" role="alert"></div>
    </div>
  </section>

  <!-- ============ オプション ============ -->
  <section class="panel" aria-labelledby="heading-options">
    <h2 id="heading-options" style="border-bottom:none; padding-bottom:0; margin-bottom:0;">
      <button id="options-toggle" type="button" class="disclosure-btn" aria-expanded="false" aria-controls="options-body">▸ 詳細オプション</button>
    </h2>
    <div id="options-body" class="hidden">
      <div class="options-grid">
        <div class="field-row">
          <label class="field" for="opt-include">include glob（複数はカンマ区切りではなく1パターン）</label>
          <input type="text" id="opt-include" placeholder="例: src/**/*.py">
        </div>
        <div class="field-row">
          <label class="field" for="opt-exclude">exclude glob</label>
          <input type="text" id="opt-exclude" placeholder="例: **/vendor/**">
        </div>
        <div class="field-row">
          <label class="field" for="opt-max-nodes">max-nodes（依存グラフ集約閾値）</label>
          <input type="number" id="opt-max-nodes" value="800" min="1">
        </div>
        <div class="field-row">
          <label class="field" for="opt-out-dir">出力先（既定: プロジェクト/code-analyzer-out）</label>
          <input type="text" id="opt-out-dir" placeholder="（既定のまま）">
        </div>
        <div class="field-row">
          <label class="field" for="opt-churn-window">履歴解析ウィンドウ（日）</label>
          <input type="number" id="opt-churn-window" value="365" min="0" aria-describedby="opt-churn-window-help">
          <div class="field-help" id="opt-churn-window-help">0で無効．全履歴は「全履歴」チェックを使用します．</div>
        </div>
      </div>
      <label class="checkbox-row" for="opt-no-gitignore">
        <input type="checkbox" id="opt-no-gitignore"> .gitignoreを無視
      </label>
      <label class="checkbox-row" for="opt-no-embed">
        <input type="checkbox" id="opt-no-embed"> ソース埋め込みOFF（影響範囲タブのソース表示が無効化される代わりにHTMLサイズ抑制）
      </label>
    </div>
  </section>

  <!-- ============ 実行 ============ -->
  <section class="panel" aria-labelledby="heading-run">
    <h2 id="heading-run">解析の実行</h2>
    <div id="run-row">
      <button id="run-btn" class="btn btn-primary btn-big" type="button" title="解析を実行（Cmd+Enter / Ctrl+Enterでも実行できます）">解析を実行</button>
      <span id="run-shortcut-hint">
        <span aria-hidden="true">&#8984;&#9166;</span>
        <span class="visually-hidden">Cmd+Enterでも実行できます</span>
      </span>
    </div>
    <div id="run-status-text" aria-live="polite" aria-atomic="true"></div>
    <div id="progress-area" class="hidden">
      <div class="progress-indeterminate" role="progressbar" aria-label="解析実行中">
        <span class="progress-fill"></span>
      </div>
      <span class="progress-static-text">実行中...</span>
      <div id="phase-steps" aria-hidden="true">
        <div class="phase-step" data-phase="走査・解析">走査・解析</div>
        <div class="phase-step" data-phase="メトリクス">メトリクス</div>
        <div class="phase-step" data-phase="履歴解析">履歴解析</div>
        <div class="phase-step" data-phase="レポート生成">レポート生成</div>
      </div>
    </div>
    <div id="result-area" class="hidden">
      <div class="summary-cards">
        <div class="summary-card"><div class="summary-value" id="sum-files">-</div><div class="summary-label">ファイル数</div></div>
        <div class="summary-card"><div class="summary-value" id="sum-parse-failures">-</div><div class="summary-label">パース失敗</div></div>
        <div class="summary-card"><div class="summary-value" id="sum-unresolved">-</div><div class="summary-label">未解決インポート</div></div>
      </div>
      <button id="open-report-btn" class="btn btn-primary btn-big" type="button">レポートを開く</button>
      <div class="out-dir-line" id="out-dir-line"></div>
    </div>
    <div id="error-area" class="error-box hidden" role="alert"></div>
  </section>

  <!-- ============ 最近の解析 ============ -->
  <section class="panel" aria-labelledby="heading-recent">
    <h2 id="heading-recent">最近の解析</h2>
    <div id="compare-toolbar" class="hidden">
      <button id="compare-btn" class="btn btn-primary btn-sm" type="button" aria-disabled="true" title="比較するには解析結果を2件選択してください">選択した2件を比較</button>
      <span id="compare-hint"></span>
    </div>
    <div id="recent-filter-row" class="field-row hidden">
      <label class="field" for="recent-filter">パスで絞り込み</label>
      <input type="text" id="recent-filter" placeholder="パスの一部を入力…">
    </div>
    <ul id="recent-list"></ul>
    <div id="recent-empty" class="hidden">まだ解析履歴はありません．</div>
    <div id="compare-error" class="error-box hidden" role="alert"></div>
  </section>
</main>

<footer>Code Analyzer GUI v__VERSION__（127.0.0.1 のみでローカル動作します）</footer>

<script>
(function(){
  "use strict";

  var state = {
    currentPath: null,
    pollTimer: null,
    jobId: null,
    compareSelection: [],   // entry TIMESTAMPS, in the order the user ticked them
    anyComparable: false,
    allRecentEntries: [],   // unfiltered, most-recent-first (from /api/recent)
    optionsPrefilled: false, // last_options applied only once, on initial load
  };

  // ---- small DOM helpers ----
  function $(id){ return document.getElementById(id); }
  function show(el){ el.classList.remove("hidden"); }
  function hide(el){ el.classList.add("hidden"); }

  function fetchJSON(url, options){
    return fetch(url, options).then(function(res){
      return res.json().then(function(data){
        return {ok: res.ok, status: res.status, data: data};
      });
    });
  }

  // ---- folder browser ----
  function browse(path, hidden){
    var url = "/api/browse?hidden=" + (hidden ? "1" : "0");
    if (path){ url += "&path=" + encodeURIComponent(path); }
    return fetchJSON(url).then(function(r){
      renderBrowse(r.data);
    });
  }

  function renderBrowse(data){
    state.currentPath = data.path;
    state.currentParent = data.parent;
    $("breadcrumb").textContent = data.path;
    $("path-input").value = data.path;
    $("up-btn").disabled = !data.parent;

    var list = $("dir-list");
    list.innerHTML = "";
    if (data.dirs && data.dirs.length){
      data.dirs.forEach(function(name){
        var li = document.createElement("li");
        var btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = name;
        btn.addEventListener("click", function(){
          var next = data.path.replace(/\/+$/, "") + "/" + name;
          browse(next, $("hidden-toggle").checked);
        });
        li.appendChild(btn);
        list.appendChild(li);
      });
    } else {
      var li = document.createElement("li");
      li.className = "empty-note";
      li.textContent = "サブフォルダはありません．";
      list.appendChild(li);
    }

    var pathInput = $("path-input");
    var errEl = $("browse-error");
    if (data.error){
      errEl.textContent = data.error;
      show(errEl);
      pathInput.setAttribute("aria-invalid", "true");
      pathInput.classList.add("invalid");
    } else {
      hide(errEl);
      pathInput.removeAttribute("aria-invalid");
      pathInput.classList.remove("invalid");
    }
  }

  $("up-btn").addEventListener("click", function(){
    if (state.currentParent){ browse(state.currentParent, $("hidden-toggle").checked); }
  });

  $("hidden-toggle").addEventListener("change", function(){
    browse(state.currentPath, this.checked);
  });

  $("path-sync-btn").addEventListener("click", function(){
    browse($("path-input").value, $("hidden-toggle").checked);
  });
  $("path-input").addEventListener("keydown", function(e){
    if (e.key === "Enter"){ browse(this.value, $("hidden-toggle").checked); }
  });
  // Sync on change/blur too: a typed/pasted path must never be silently
  // ignored just because the user clicked 解析を実行 without pressing Enter.
  $("path-input").addEventListener("change", function(){
    var typed = this.value.trim();
    if (typed && typed !== state.currentPath){
      browse(typed, $("hidden-toggle").checked);
    }
  });

  // ---- options collapse ----
  $("options-toggle").addEventListener("click", function(){
    var body = $("options-body");
    var open = !body.classList.contains("hidden");
    if (open){
      hide(body);
      $("options-toggle").textContent = "▸ 詳細オプション";
      $("options-toggle").setAttribute("aria-expanded", "false");
    } else {
      show(body);
      $("options-toggle").textContent = "▾ 詳細オプション";
      $("options-toggle").setAttribute("aria-expanded", "true");
    }
  });

  // ---- phase indicator ----
  var PHASE_ORDER = ["走査・解析", "メトリクス", "履歴解析", "レポート生成"];
  function updatePhaseSteps(currentPhase){
    var idx = PHASE_ORDER.indexOf(currentPhase);
    document.querySelectorAll(".phase-step").forEach(function(el){
      var elIdx = PHASE_ORDER.indexOf(el.getAttribute("data-phase"));
      el.classList.remove("current", "past");
      if (idx === -1){ return; }
      if (elIdx < idx){ el.classList.add("past"); }
      else if (elIdx === idx){ el.classList.add("current"); }
    });
    setRunStatusText(currentPhase ? ("進行中: " + currentPhase) : "");
  }

  function setRunStatusText(text){
    $("run-status-text").textContent = text;
  }

  function resetRunUI(){
    hide($("progress-area"));
    hide($("result-area"));
    hide($("error-area"));
    updatePhaseSteps(null);
  }

  function buildOptionsFromForm(){
    return {
      include: $("opt-include").value.trim(),
      exclude: $("opt-exclude").value.trim(),
      no_gitignore: $("opt-no-gitignore").checked,
      embed_sources: !$("opt-no-embed").checked,
      max_nodes: parseInt($("opt-max-nodes").value, 10) || 800,
      out_dir: $("opt-out-dir").value.trim() || undefined,
      churn_window: (function(){
        var v = parseInt($("opt-churn-window").value, 10);
        return isNaN(v) ? 365 : v;
      })(),
    };
  }

  function applyOptionsToForm(options){
    options = options || {};
    $("opt-include").value = options.include || "";
    $("opt-exclude").value = options.exclude || "";
    $("opt-no-gitignore").checked = !!options.no_gitignore;
    $("opt-no-embed").checked = options.embed_sources === false;
    $("opt-max-nodes").value = options.max_nodes || 800;
    $("opt-churn-window").value = (options.churn_window != null) ? options.churn_window : 365;
    if (options.out_dir != null){ $("opt-out-dir").value = options.out_dir; }
  }

  function runAnalyze(){
    resetRunUI();
    show($("progress-area"));
    $("run-btn").disabled = true;
    updatePhaseSteps("走査・解析");

    // Defensive submit-time read of path-input: if the user typed/pasted a
    // path without pressing Enter (so state.currentPath is stale), the typed
    // value wins. The server validates existence, so a bad path just errors.
    var typedPath = $("path-input").value.trim();
    var submitPath = (typedPath && typedPath !== state.currentPath)
      ? typedPath : state.currentPath;

    var opts = buildOptionsFromForm();
    var body = {
      path: submitPath,
      include: opts.include,
      exclude: opts.exclude,
      no_gitignore: opts.no_gitignore,
      embed_sources: opts.embed_sources,
      max_nodes: opts.max_nodes,
      churn_window: opts.churn_window,
    };
    if (opts.out_dir){ body.out_dir = opts.out_dir; }

    fetchJSON("/api/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    }).then(function(r){
      if (!r.ok){
        showError(r.data.error || "解析を開始できませんでした．");
        return;
      }
      state.jobId = r.data.job_id;
      pollStatus();
    }).catch(function(e){
      showError(String(e));
    });
  }

  function pollStatus(){
    if (state.pollTimer){ clearInterval(state.pollTimer); }
    state.pollTimer = setInterval(function(){
      fetchJSON("/api/status?job=" + encodeURIComponent(state.jobId)).then(function(r){
        if (!r.ok){
          clearInterval(state.pollTimer);
          showError(r.data.error || "ジョブ状態を取得できませんでした．");
          return;
        }
        var data = r.data;
        updatePhaseSteps(data.done ? "レポート生成" : data.phase);
        if (data.done){
          clearInterval(state.pollTimer);
          $("run-btn").disabled = false;
          if (data.error){
            showError(data.error, data.error_detail);
          } else {
            showResult(data);
          }
          loadRecent();
        }
      }).catch(function(e){
        clearInterval(state.pollTimer);
        showError(String(e));
      });
    }, 500);
  }

  function showResult(data){
    hide($("error-area"));
    hide($("progress-area"));
    var s = data.summary || {};
    $("sum-files").textContent = s.files != null ? s.files : "-";
    $("sum-parse-failures").textContent = s.parse_failures != null ? s.parse_failures : "-";
    $("sum-unresolved").textContent = s.unresolved_imports != null ? s.unresolved_imports : "-";
    $("out-dir-line").textContent = "出力先: " + data.out_dir;
    $("open-report-btn").onclick = function(){
      window.open(data.report_url, "_blank", "noopener");
    };
    show($("result-area"));
    setRunStatusText("解析が完了しました．ファイル数: " + (s.files != null ? s.files : "-"));
  }

  // ---- clipboard (used by the error-detail コピー button) ----
  function fallbackCopyText(text){
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "-1000px";
    ta.style.left = "-1000px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok = false;
    try { ok = document.execCommand("copy"); } catch (e){ ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  function copyTextToClipboard(text, onDone){
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(
        function(){ onDone(true); },
        function(){ onDone(fallbackCopyText(text)); }
      );
    } else {
      onDone(fallbackCopyText(text));
    }
  }

  function buildErrorDetail(detail){
    var details = document.createElement("details");
    details.className = "error-detail";
    var summary = document.createElement("summary");
    summary.textContent = "詳細";
    details.appendChild(summary);

    var pre = document.createElement("pre");
    pre.className = "error-detail-pre";
    pre.textContent = detail;
    pre.setAttribute("tabindex", "0");
    details.appendChild(pre);

    var copyBtn = document.createElement("button");
    copyBtn.type = "button";
    copyBtn.className = "btn btn-sm";
    copyBtn.textContent = "コピー";
    copyBtn.addEventListener("click", function(){
      var originalLabel = "コピー";
      copyTextToClipboard(detail, function(ok){
        copyBtn.textContent = ok ? "コピーしました" : "コピーできませんでした";
        setTimeout(function(){ copyBtn.textContent = originalLabel; }, 1500);
      });
    });
    details.appendChild(copyBtn);
    return details;
  }

  function showError(message, detail){
    $("run-btn").disabled = false;
    hide($("progress-area"));
    var el = $("error-area");
    el.innerHTML = "";
    var msgDiv = document.createElement("div");
    msgDiv.textContent = "エラー: " + message;
    el.appendChild(msgDiv);
    if (detail){
      el.appendChild(buildErrorDetail(detail));
    }
    show(el);
    setRunStatusText("エラー: " + message);
  }

  $("run-btn").addEventListener("click", function(){
    if (!state.currentPath && !$("path-input").value.trim()){
      showError("プロジェクトフォルダを選択してください．");
      return;
    }
    runAnalyze();
  });

  // ---- keyboard shortcut: Cmd+Enter (mac) / Ctrl+Enter (anywhere on the
  // page) triggers 解析を実行, but only when a run is not already in
  // progress (mirrors the run-btn's own disabled state).
  document.addEventListener("keydown", function(e){
    if (e.key !== "Enter"){ return; }
    if (!(e.metaKey || e.ctrlKey)){ return; }
    if ($("run-btn").disabled){ return; }
    e.preventDefault();
    $("run-btn").click();
  });

  // ---- recent analyses ----
  function fmtTimestamp(ts){
    if (!ts){ return ""; }
    try {
      var d = new Date(ts);
      if (isNaN(d.getTime())){ return ts; }
      return d.toLocaleString();
    } catch (e){
      return ts;
    }
  }

  // Coarse "N分前" / "N日前" style relative time, computed client-side so
  // it always reflects the viewer's current clock (the absolute timestamp
  // is kept as a title= tooltip alongside it, see renderRecent()).
  function relativeTime(ts){
    if (!ts){ return ""; }
    var d = new Date(ts);
    if (isNaN(d.getTime())){ return ""; }
    var diffSec = Math.round((Date.now() - d.getTime()) / 1000);
    if (diffSec < 0){ diffSec = 0; }
    if (diffSec < 60){ return "たった今"; }
    var diffMin = Math.floor(diffSec / 60);
    if (diffMin < 60){ return diffMin + "分前"; }
    var diffHour = Math.floor(diffMin / 60);
    if (diffHour < 24){ return diffHour + "時間前"; }
    var diffDay = Math.floor(diffHour / 24);
    if (diffDay < 30){ return diffDay + "日前"; }
    var diffMonth = Math.floor(diffDay / 30);
    if (diffMonth < 12){ return diffMonth + "ヶ月前"; }
    return Math.floor(diffDay / 365) + "年前";
  }

  function loadRecent(){
    fetchJSON("/api/recent").then(function(r){
      var data = r.data || {};
      renderRecent(data.entries || []);
      // last_options prefills the 詳細オプション form on the INITIAL load
      // only -- reapplying it after every later loadRecent() (which also
      // fires when a job finishes) would clobber options the user is
      // already editing for their next run.
      if (!state.optionsPrefilled){
        state.optionsPrefilled = true;
        if (data.last_options){ applyOptionsToForm(data.last_options); }
      }
    });
  }

  function updatePathDatalist(entries){
    var dl = $("path-datalist");
    dl.innerHTML = "";
    var seen = {};
    entries.forEach(function(entry){
      var p = entry.path;
      if (!p || seen[p]){ return; }
      seen[p] = true;
      var opt = document.createElement("option");
      opt.value = p;
      dl.appendChild(opt);
    });
  }

  function currentRecentFilterText(){
    return $("recent-filter").value.trim().toLowerCase();
  }

  function renderRecent(entries){
    state.allRecentEntries = entries;
    updatePathDatalist(entries);

    // Selection is keyed by entry TIMESTAMP (not out_dir): two runs of the
    // SAME project share the default out_dir, so out_dir cannot tell them
    // apart -- the timestamp can (the server's /api/compare uses the same
    // identity). Drop selections whose timestamp no longer appears in the
    // (possibly pruned) recent list.
    var stillPresent = {};
    entries.forEach(function(e){ if (e.timestamp){ stillPresent[e.timestamp] = true; } });
    state.compareSelection = state.compareSelection.filter(function(t){ return stillPresent[t]; });

    // Filter box (only shown once there is enough history to make filtering
    // worthwhile): filters by path substring, case-insensitive.
    var filterRow = $("recent-filter-row");
    if (entries.length > 3){
      show(filterRow);
    } else {
      hide(filterRow);
      $("recent-filter").value = "";
    }
    var filterText = currentRecentFilterText();
    var visible = filterText
      ? entries.filter(function(e){ return (e.path || "").toLowerCase().indexOf(filterText) !== -1; })
      : entries;

    var list = $("recent-list");
    list.innerHTML = "";
    state.anyComparable = false;
    if (!entries.length){
      $("recent-empty").textContent = "まだ解析履歴はありません．";
      show($("recent-empty"));
      updateCompareToolbar();
      return;
    }
    if (!visible.length){
      $("recent-empty").textContent = "条件に一致する解析履歴はありません．";
      show($("recent-empty"));
      updateCompareToolbar();
      return;
    }
    hide($("recent-empty"));
    visible.forEach(function(entry){
      var li = document.createElement("li");

      var main = document.createElement("div");
      main.className = "recent-main";
      var pathDiv = document.createElement("div");
      pathDiv.className = "recent-path";
      pathDiv.textContent = entry.path || "";
      // full path tooltip (useful once CSS truncates a long path visually)
      pathDiv.title = entry.path || "";
      var metaDiv = document.createElement("div");
      metaDiv.className = "recent-meta";
      var files = (entry.summary && entry.summary.files != null) ? entry.summary.files : "-";
      var tsLabel = fmtTimestamp(entry.timestamp);
      var tsRelative = relativeTime(entry.timestamp);
      // 日時 rendered prominently (own styled span) so two runs of the
      // same path are easy to tell apart in the list. Relative time is the
      // visible text; the absolute timestamp is kept as a title= tooltip.
      var tsSpan = document.createElement("span");
      tsSpan.className = "recent-ts";
      tsSpan.textContent = "日時: " + (tsRelative || tsLabel);
      if (tsLabel){ tsSpan.title = tsLabel; }
      metaDiv.appendChild(tsSpan);
      metaDiv.appendChild(document.createTextNode("・ファイル数: " + files));
      main.appendChild(pathDiv);
      main.appendChild(metaDiv);

      var actions = document.createElement("div");
      actions.className = "recent-actions";

      // 比較対象 checkbox: only for entries that carry a snapshot (older
      // pre-v1.3 entries have nothing comparable on disk).
      if (entry.timestamp && entry.snapshot){
        state.anyComparable = true;
        var compareLabel = document.createElement("label");
        compareLabel.className = "recent-compare-label";
        var compareCb = document.createElement("input");
        compareCb.type = "checkbox";
        compareCb.className = "recent-compare-checkbox";
        compareCb.checked = state.compareSelection.indexOf(entry.timestamp) !== -1;
        compareCb.setAttribute("aria-label", tsLabel + " の解析を比較対象にする");
        compareCb.addEventListener("change", function(){
          var idx = state.compareSelection.indexOf(entry.timestamp);
          if (this.checked && idx === -1){
            state.compareSelection.push(entry.timestamp);
          } else if (!this.checked && idx !== -1){
            state.compareSelection.splice(idx, 1);
          }
          updateCompareToolbar();
        });
        compareLabel.appendChild(compareCb);
        compareLabel.appendChild(document.createTextNode("比較対象"));
        actions.appendChild(compareLabel);
      }

      var rerunBtn = document.createElement("button");
      rerunBtn.className = "btn btn-sm";
      rerunBtn.type = "button";
      rerunBtn.textContent = "再解析";
      rerunBtn.addEventListener("click", function(){
        applyOptionsToForm(entry.options);
        if (entry.out_dir){ $("opt-out-dir").value = entry.out_dir; }
        browse(entry.path, $("hidden-toggle").checked).then(function(){
          runAnalyze();
        });
        window.scrollTo({top: 0, behavior: "smooth"});
      });
      actions.appendChild(rerunBtn);

      if (entry.report_exists && entry.out_dir){
        var openBtn = document.createElement("a");
        openBtn.className = "btn btn-sm";
        openBtn.textContent = "レポートを開く";
        // served via the server-side whitelist endpoint (browsers block
        // file: navigation from a page loaded over HTTP)
        openBtn.href = "/api/report-file?path=" + encodeURIComponent(entry.out_dir);
        openBtn.target = "_blank";
        openBtn.rel = "noopener";
        actions.appendChild(openBtn);
      }

      li.appendChild(main);
      li.appendChild(actions);
      list.appendChild(li);
    });
    updateCompareToolbar();
  }

  $("recent-filter").addEventListener("input", function(){
    renderRecent(state.allRecentEntries);
  });

  // ---- compare two recent analyses ----
  function updateCompareToolbar(){
    var toolbar = $("compare-toolbar");
    var btn = $("compare-btn");
    var hint = $("compare-hint");
    if (!state.anyComparable){
      hide(toolbar);
      return;
    }
    show(toolbar);
    var n = state.compareSelection.length;
    var ready = n === 2;
    btn.setAttribute("aria-disabled", String(!ready));
    if (ready){
      btn.title = "選択した2件を比較します";
      hint.textContent = "";
    } else {
      btn.title = "比較するには解析結果を2件選択してください";
      hint.textContent = n === 0 ? "比較対象を2件選択してください" : "あと" + (2 - n) + "件選択してください（現在" + n + "件）";
    }
  }

  function showCompareError(message){
    var el = $("compare-error");
    el.textContent = "エラー: " + message;
    show(el);
  }

  $("compare-btn").addEventListener("click", function(){
    if (this.getAttribute("aria-disabled") === "true"){ return; }
    hide($("compare-error"));
    if (state.compareSelection.length !== 2){ return; }
    var btn = this;
    btn.setAttribute("aria-disabled", "true");
    fetchJSON("/api/compare", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      // a/b order does not matter: the server orders old/new by timestamp.
      body: JSON.stringify({
        a_ts: state.compareSelection[0],
        b_ts: state.compareSelection[1],
      }),
    }).then(function(r){
      updateCompareToolbar();
      if (!r.ok){
        showCompareError(r.data.error || "比較を実行できませんでした．");
        return;
      }
      window.open(r.data.compare_url, "_blank", "noopener");
    }).catch(function(e){
      updateCompareToolbar();
      showCompareError(String(e));
    });
  });

  // ---- init ----
  resetRunUI();
  browse(null, false);
  loadRecent();
})();
</script>
</body>
</html>
